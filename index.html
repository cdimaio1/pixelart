<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mad Lab</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /*  Home page specific styles  */

    /* dark purple background for the whole page */
    body.home {
      background: #1a0a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      font-family: 'Arial Black', 'Arial Bold', sans-serif;
    }

    /* canvas sits behind everything else */
    #home-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* all content sits above canvas */
    .home-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /*  Title  */
    .home-title {
      font-size: clamp(60px, 12vw, 120px); /* scales with screen width */
      font-weight: 900;
      color: #39ff14;           /* bright neon green */
      letter-spacing: -2px;
      line-height: 0.9;
      text-align: center;
      /* thick black outline */
      -webkit-text-stroke: 4px #000;
      paint-order: stroke fill;
      /* yellow drop shadow for depth */
      text-shadow:
        6px 6px 0px #f7c948,
        8px 8px 0px #000;
      /* slight rotation for hand-drawn feel */
      transform: rotate(-2deg);
      animation: titleWobble 3s ease-in-out infinite;
    }

    /* subtle wobble animation on title */
    @keyframes titleWobble {
      0%, 100% { transform: rotate(-2deg) scale(1); }
      50%       { transform: rotate(-1.5deg) scale(1.02); }
    }

    /*  Tagline  */
    .home-tagline {
      font-size: clamp(14px, 2.5vw, 20px);
      color: #f7c948;           /* yellow */
      letter-spacing: 3px;
      text-transform: uppercase;
      -webkit-text-stroke: 1px #000;
      text-shadow: 2px 2px 0px #000;
      transform: rotate(1deg);  /* slight opposite tilt to title */
    }

    /*  Play button  */
    .play-btn {
      display: inline-block;
      padding: 18px 56px;
      background: #f7c948;      /* yellow */
      color: #000;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 900;
      font-family: 'Arial Black', sans-serif;
      text-decoration: none;
      border: 4px solid #000;
      border-radius: 50px;      /* pill shape */
      /* chunky layered shadow for cartoon effect */
      box-shadow: 5px 5px 0px #000;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
      animation: btnPulse 2s ease-in-out infinite;
    }

    .play-btn:hover {
      transform: translate(-2px, -2px); /* lifts up on hover */
      box-shadow: 7px 7px 0px #000;
      background: #39ff14;      /* switches to green on hover */
    }

    .play-btn:active {
      transform: translate(3px, 3px); /* pushes down on click */
      box-shadow: 2px 2px 0px #000;
    }

    /* gentle pulse to draw attention to button */
    @keyframes btnPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }

    /* Scientist canvas */
    #scientist-canvas {
      width: 180px;
      height: 280px;
    }
  </style>
</head>
<body class="home">

  <!-- background canvas — floating bubbles and particles -->
  <canvas id="home-canvas"></canvas>

  <div class="home-content">

    <!-- title -->
    <h1 class="home-title">MAD<br>LAB</h1>

    <!-- tagline -->
    <p class="home-tagline">Science waits for no one</p>

    <!-- animated scientist character -->
    <canvas id="scientist-canvas"></canvas>

    <!-- play button -->
    <a href="intro.html" class="play-btn">▶ Play Game</a>

  </div>

  <script>
  //  Background canvas : floating bubbles 
  var bgCanvas = document.getElementById('home-canvas');
  var bgCtx    = bgCanvas.getContext('2d');
  var bubbles  = [];

  // resize background canvas to fill window
  function resizeBg() {
    bgCanvas.width  = window.innerWidth;
    bgCanvas.height = window.innerHeight;
  }
  resizeBg();
  window.addEventListener('resize', resizeBg);

  // create a pool of floating bubbles
  for (var i = 0; i < 35; i++) {
    bubbles.push({
      x:     Math.random() * window.innerWidth,
      y:     Math.random() * window.innerHeight,
      r:     4 + Math.random() * 14,
      speed: 0.4 + Math.random() * 0.8,
      wobble: Math.random() * Math.PI * 2, // random starting phase
      col:   ['#39ff14','#b44fff','#f7c948','#00e5ff'][Math.floor(Math.random()*4)]
    });
  }

  // animate bubbles floating upward with a slight wobble
  function animateBg() {
    requestAnimationFrame(animateBg);
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

    for (var i = 0; i < bubbles.length; i++) {
      var b = bubbles[i];
      b.y      -= b.speed;                   // float upward
      b.wobble += 0.02;                      // advance wobble phase
      b.x      += Math.sin(b.wobble) * 0.5; // gentle left-right sway

      // wrap around when bubble reaches top
      if (b.y < -b.r * 2) {
        b.y = bgCanvas.height + b.r;
        b.x = Math.random() * bgCanvas.width;
      }

      // draw bubble with outline
      bgCtx.beginPath();
      bgCtx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      bgCtx.fillStyle   = b.col;
      bgCtx.globalAlpha = 0.18;
      bgCtx.fill();
      bgCtx.globalAlpha = 0.5;
      bgCtx.strokeStyle = b.col;
      bgCtx.lineWidth   = 1.5;
      bgCtx.stroke();
      bgCtx.globalAlpha = 1;
    }
  }
  animateBg();

  // Scientist canvas 
  var sc    = document.getElementById('scientist-canvas');
  var sctx  = sc.getContext('2d');
  sc.width  = 180;
  sc.height = 280;
  var scFrame = 0;

  function drawHomeScientist() {
    requestAnimationFrame(drawHomeScientist);
    scFrame++;
    sctx.clearRect(0, 0, sc.width, sc.height);

    var cx  = sc.width / 2;        // horizontal center
    var bob = Math.sin(scFrame * 0.05) * 5; // gentle up-down bob
    var sw  = 54;                  // fixed shoulder width for home screen
    var hr  = sw * 0.42;           // head radius

    // body positions : fixed skeleton for home screen
    var lSh  = { x: cx - sw/2, y: 110 + bob };
    var rSh  = { x: cx + sw/2, y: 110 + bob };
    var lEl  = { x: cx - sw*0.8, y: 148 + bob };
    var rEl  = { x: cx + sw*0.8, y: 148 + bob };
    var lWr  = { x: cx - sw*0.9, y: 185 + bob };
    var rWr  = { x: cx + sw*0.9, y: 185 + bob };
    var lHip = { x: cx - sw*0.3, y: 185 + bob };
    var rHip = { x: cx + sw*0.3, y: 185 + bob };

    // leg walk cycle using sine wave on frame count
    var legSwing = Math.sin(scFrame * 0.08) * 14;
    var lKn  = { x: cx - sw*0.25 - legSwing*0.3, y: 220 + bob };
    var rKn  = { x: cx + sw*0.25 + legSwing*0.3, y: 220 + bob };
    var lAn  = { x: cx - sw*0.22 - legSwing*0.5, y: 255 + bob };
    var rAn  = { x: cx + sw*0.22 + legSwing*0.5, y: 255 + bob };

    // head position
    var hx = cx;
    var hy = 76 + bob;

    // draw legs 
    sctx.strokeStyle = '#2a2a3a';
    sctx.lineWidth   = sw * 0.22;
    sctx.lineCap     = 'round';
    sctx.beginPath(); sctx.moveTo(lHip.x, lHip.y); sctx.lineTo(lKn.x, lKn.y); sctx.lineTo(lAn.x, lAn.y); sctx.stroke();
    sctx.beginPath(); sctx.moveTo(rHip.x, rHip.y); sctx.lineTo(rKn.x, rKn.y); sctx.lineTo(rAn.x, rAn.y); sctx.stroke();

    // shoes
    sctx.fillStyle = '#111';
    sctx.beginPath(); sctx.ellipse(lAn.x + 4, lAn.y + 4, 10, 5, 0, 0, Math.PI*2); sctx.fill();
    sctx.beginPath(); sctx.ellipse(rAn.x + 4, rAn.y + 4, 10, 5, 0, 0, Math.PI*2); sctx.fill();

    //  draw coat (torso) 
    sctx.fillStyle   = '#eef0f5';
    sctx.strokeStyle = '#b0b8cc';
    sctx.lineWidth   = 2;
    sctx.beginPath();
    sctx.moveTo(lSh.x - 6, lSh.y);
    sctx.lineTo(lHip.x - 10, lHip.y);
    sctx.lineTo(rHip.x + 10, rHip.y);
    sctx.lineTo(rSh.x + 6, rSh.y);
    sctx.closePath();
    sctx.fill(); sctx.stroke();

    // lapels
    sctx.fillStyle = '#d8dce8';
    sctx.beginPath(); sctx.moveTo(cx, lSh.y+14); sctx.lineTo(lSh.x+8, lSh.y+28); sctx.lineTo(cx-8, lHip.y*0.4+lSh.y*0.6); sctx.closePath(); sctx.fill();
    sctx.beginPath(); sctx.moveTo(cx, rSh.y+14); sctx.lineTo(rSh.x-8, rSh.y+28); sctx.lineTo(cx+8, rHip.y*0.4+rSh.y*0.6); sctx.closePath(); sctx.fill();

    //  draw arms 
    sctx.strokeStyle = '#eef0f5';
    sctx.lineWidth   = sw * 0.18;
    sctx.lineCap     = 'round';
    sctx.beginPath(); sctx.moveTo(lSh.x, lSh.y); sctx.lineTo(lEl.x, lEl.y); sctx.lineTo(lWr.x, lWr.y); sctx.stroke();
    sctx.beginPath(); sctx.moveTo(rSh.x, rSh.y); sctx.lineTo(rEl.x, rEl.y); sctx.lineTo(rWr.x, rWr.y); sctx.stroke();

    // gloves
    sctx.fillStyle   = '#5599ee';
    sctx.strokeStyle = '#3377cc';
    sctx.lineWidth   = 1.5;
    sctx.beginPath(); sctx.arc(lWr.x, lWr.y, 7, 0, Math.PI*2); sctx.fill(); sctx.stroke();
    sctx.beginPath(); sctx.arc(rWr.x, rWr.y, 7, 0, Math.PI*2); sctx.fill(); sctx.stroke();
    sctx.lineCap = 'butt';

    // draw face 
    // neck
    sctx.fillStyle = '#f0c090';
    sctx.fillRect(hx - 6, hy + hr*0.6, 12, hr*0.5);

    // face
    sctx.fillStyle   = '#f5c8a0';
    sctx.strokeStyle = '#d4a070';
    sctx.lineWidth   = 2;
    sctx.beginPath(); sctx.ellipse(hx, hy, hr*0.78, hr, 0, 0, Math.PI*2); sctx.fill(); sctx.stroke();

    //wild hair 
    sctx.fillStyle   = '#eeeeee';
    sctx.strokeStyle = '#cccccc';
    sctx.lineWidth   = 1;
    sctx.beginPath();
    sctx.moveTo(hx - hr*0.82, hy - hr*0.1);
    sctx.bezierCurveTo(hx - hr*1.4, hy - hr*1.5, hx - hr*0.4, hy - hr*2.1, hx, hy - hr*1.9);
    sctx.bezierCurveTo(hx + hr*0.4, hy - hr*2.1, hx + hr*1.4, hy - hr*1.5, hx + hr*0.82, hy - hr*0.1);
    sctx.fill(); sctx.stroke();

    // hair spikes
    sctx.strokeStyle = '#dddddd';
    sctx.lineWidth   = hr * 0.1;
    sctx.lineCap     = 'round';
    var spikes = [[-1.5,-0.7],[-1.2,-1.5],[-0.5,-2.2],[0.3,-2.3],[1.1,-1.8],[1.45,-0.9]];
    for (var i = 0; i < spikes.length; i++) {
      sctx.beginPath();
      sctx.moveTo(hx + spikes[i][0]*hr*0.65, hy + spikes[i][1]*hr*0.55);
      sctx.lineTo(hx + spikes[i][0]*hr*0.95, hy + spikes[i][1]*hr*0.85);
      sctx.stroke();
    }
    sctx.lineCap = 'butt';

    // goggles 
    var gy = hy - hr*0.08;
    sctx.strokeStyle = '#555'; sctx.lineWidth = hr*0.1;
    sctx.beginPath(); sctx.moveTo(hx - hr*0.88, gy); sctx.lineTo(hx + hr*0.88, gy); sctx.stroke();
    sctx.fillStyle = 'rgba(80,180,255,0.38)'; sctx.strokeStyle = '#777'; sctx.lineWidth = hr*0.1;
    sctx.beginPath(); sctx.arc(hx - hr*0.3, gy, hr*0.27, 0, Math.PI*2); sctx.fill(); sctx.stroke();
    sctx.beginPath(); sctx.arc(hx + hr*0.3, gy, hr*0.27, 0, Math.PI*2); sctx.fill(); sctx.stroke();
    sctx.fillStyle = 'rgba(255,255,255,0.55)';
    sctx.beginPath(); sctx.arc(hx - hr*0.37, gy - hr*0.1, hr*0.08, 0, Math.PI*2); sctx.fill();
    sctx.beginPath(); sctx.arc(hx + hr*0.23, gy - hr*0.1, hr*0.08, 0, Math.PI*2); sctx.fill();
  }
  drawHomeScientist();
  </script>
</body>
</html>
